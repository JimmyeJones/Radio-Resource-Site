services:
  web:
    build: .
    image: radio-resource-site:latest
    container_name: radio-web
    command: ["node_modules/.bin/next", "start"]
    ports:
      - "3000:3000"
    environment:
      DATABASE_PATH: /data/app.db
      MEDIA_DIR: /media
      NODE_ENV: production
    volumes:
      - data:/data
      - media:/media
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/api/jobs').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 5

  worker:
    build: .
    image: radio-resource-site:latest
    container_name: radio-worker
    depends_on:
      - web
    command: ["node", "dist/worker/index.js"]
    environment:
      DATABASE_PATH: /data/app.db
      MEDIA_DIR: /media
      NODE_ENV: production
    volumes:
      - data:/data
      - media:/media
    restart: unless-stopped

volumes:
  data:
  media:
