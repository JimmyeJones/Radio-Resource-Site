<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="Radio Resource">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#0f1c30"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#2dd4bf"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <g fill="none" stroke="url(#accent)" stroke-linecap="round">
    <!-- signal arcs radiating from the antenna tip -->
    <g stroke-width="14" opacity="0.95">
      <path d="M256 150 a8 8 0 0 1 0 0"/>
    </g>
    <g stroke-width="13" opacity="0.85">
      <path d="M214 168 q-22 38 0 76"/>
      <path d="M298 168 q22 38 0 76"/>
    </g>
    <g stroke-width="12" opacity="0.6">
      <path d="M180 150 q-40 56 0 112"/>
      <path d="M332 150 q40 56 0 112"/>
    </g>
    <g stroke-width="11" opacity="0.38">
      <path d="M148 134 q-58 72 0 144"/>
      <path d="M364 134 q58 72 0 144"/>
    </g>
  </g>
  <!-- antenna mast + legs -->
  <g fill="url(#accent)">
    <circle cx="256" cy="150" r="20"/>
    <path d="M248 168 h16 l26 200 h-22 l-12 -96 -12 96 h-22 z"/>
    <rect x="206" y="300" width="100" height="13" rx="6" transform="rotate(0 256 306)"/>
  </g>
</svg>
